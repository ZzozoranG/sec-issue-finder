name: Feature request
description: Suggest a scoped improvement for sec-issue-finder.
title: "feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior and CLI/API shape you would expect.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - npm parser
        - OSV client
        - reporting
        - CI policy
        - future ecosystem
        - documentation
        - other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Do not describe unsupported ecosystem support as already implemented.
    validations:
      required: false
