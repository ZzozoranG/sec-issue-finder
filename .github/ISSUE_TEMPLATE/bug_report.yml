name: Bug report
description: Report a reproducible bug in sec-issue-finder.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include private dependency names or proprietary lockfiles unless you are comfortable making them public.
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `sec-issue-finder --version` or the commit SHA.
      placeholder: "sec-issue-finder 0.1.0"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: The command you ran.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include a small sanitized fixture if possible. Do not run package managers to generate fixtures unless necessary.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Rust version, lockfile type, and relevant CI environment.
    validations:
      required: false
