name: npm Publish

on:
  workflow_dispatch:
    inputs:
      confirm_publish:
        description: "Type publish to publish npm packages"
        required: true
        type: string
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    name: Verify release inputs
    runs-on: ubuntu-latest

    steps:
      - name: Check manual confirmation
        if: github.event_name == 'workflow_dispatch' && inputs.confirm_publish != 'publish'
        run: |
          echo "Manual publish requires confirm_publish=publish"
          exit 1

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify npm version supports trusted publishing
        run: npm --version

      - name: Install npm metadata dependencies
        run: npm install --ignore-scripts --omit=optional --no-package-lock

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Run test-utils tests
        run: cargo test --features test-utils

      - name: Run npm tests
        run: npm test

      - name: Run npm lint
        run: npm run lint --if-present

      - name: Check main package contents
        run: npm pack --dry-run

  build-platform-package:
    name: Build ${{ matrix.package-dir }}
    needs: verify
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - package-dir: linux-x64
            runner: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            platform: linux
            arch: x64
            binary-path: target/x86_64-unknown-linux-gnu/release/sec-issue-finder
            artifact-name: sec-issue-finder-linux-x64-npm-package

          - package-dir: win32-x64
            runner: windows-latest
            rust-target: x86_64-pc-windows-msvc
            platform: win32
            arch: x64
            binary-path: target/x86_64-pc-windows-msvc/release/sec-issue-finder.exe
            artifact-name: sec-issue-finder-win32-x64-npm-package

          - package-dir: darwin-arm64
            runner: macos-latest
            rust-target: aarch64-apple-darwin
            platform: darwin
            arch: arm64
            binary-path: target/aarch64-apple-darwin/release/sec-issue-finder
            artifact-name: sec-issue-finder-darwin-arm64-npm-package

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install npm metadata dependencies
        run: npm install --ignore-scripts --omit=optional --no-package-lock

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.rust-target }}

      - name: Prepare platform package
        run: >
          node scripts/prepare-platform-package.mjs
          --platform ${{ matrix.platform }}
          --arch ${{ matrix.arch }}
          --binary ${{ matrix.binary-path }}

      - name: Pack platform package
        working-directory: packages/${{ matrix.package-dir }}
        run: |
          node -e "require('node:fs').mkdirSync('../../dist', { recursive: true })"
          npm pack --pack-destination ../../dist

      - name: Upload platform package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/*.tgz
          if-no-files-found: error

  publish:
    name: Publish npm packages
    needs: build-platform-package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Download platform package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: sec-issue-finder-*-npm-package
          merge-multiple: true

      - name: Pack main package
        run: npm pack --pack-destination dist

      - name: List packages to publish
        run: ls -la dist

      - name: Publish platform packages
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          npm publish "./dist/zzozorang-sec-issue-finder-darwin-arm64-${PACKAGE_VERSION}.tgz" --access public
          npm publish "./dist/zzozorang-sec-issue-finder-linux-x64-${PACKAGE_VERSION}.tgz" --access public
          npm publish "./dist/zzozorang-sec-issue-finder-win32-x64-${PACKAGE_VERSION}.tgz" --access public

      - name: Publish main package
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          npm publish "./dist/zzozorang-sec-issue-finder-${PACKAGE_VERSION}.tgz" --access public
